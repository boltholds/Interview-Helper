name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: "2.1.3"
          virtualenvs-create: true
      - run: poetry install
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run ruff check . --output-format=concise | tee ruff-report.txt
      - name: Upload Ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: backend/ruff-report.txt
      - name: Fail on Ruff errors
        if: steps.ruff.outcome == 'failure'
        run: exit 1
      - run: poetry run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.gpu.yml config --quiet
