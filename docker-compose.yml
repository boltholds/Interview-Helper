services:
  whispercpp:
    build:
      context: ./services/whispercpp
      dockerfile: Dockerfile
      args:
        WHISPER_CPP_VERSION: ${WHISPER_CPP_VERSION:-v1.8.5}
    environment:
      WHISPERCPP_MODEL: ${WHISPERCPP_MODEL:-small}
      WHISPERCPP_LANGUAGE: ${WHISPERCPP_LANGUAGE:-auto}
      WHISPERCPP_THREADS: ${WHISPERCPP_THREADS:-6}
      WHISPERCPP_USE_GPU: "false"
      WHISPERCPP_FLASH_ATTENTION: "false"
    ports:
      - "127.0.0.1:${WHISPERCPP_HOST_PORT:-8081}:8080"
    volumes:
      - whisper_models:/models
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      WHISPERCPP_BASE_URL: ${WHISPERCPP_BASE_URL:-http://whispercpp:8080}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      whispercpp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  whisper_models:
